<!DOCTYPE html>
<html>
<head>
    <title>Shimelis-apk1 - Batisa, Leda, Beeha, Xeisa, Sidama, Hawaasa, Lakko</title>
    <meta name="description" content="Download Shimelis-apk1 for Batisa, Leda, Beeha, Xeisa, Sidama, Hawaasa, Lakko.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 style="text-align:center; font-size:16px; margin:10px;">Batisa • Leda • Beeha • Xeisa • Sidama • Hawaasa • Lakko</h1>
    
    <div class="calculator">
        <input type="text" id="display" readonly>
        
        <div class="buttons">
            <button onclick="clearDisplay()">C</button>
            <button onclick="deleteLast()">⌫</button>
            <button onclick="append('%')">%</button>
            <button onclick="append('/')">÷</button>
            
            <button onclick="append('7')">7</button>
            <button onclick="append('8')">8</button>
            <button onclick="append('9')">9</button>
            <button onclick="append('*')">×</button>
            
            <button onclick="append('4')">4</button>
            <button onclick="append('5')">5</button>
            <button onclick="append('6')">6</button>
            <button onclick="append('-')">-</button>
            
            <button onclick="append('1')">1</button>
            <button onclick="append('2')">2</button>
            <button onclick="append('3')">3</button>
            <button onclick="append('+')">+</button>
            
            <button onclick="append('0')">0</button>
            <button onclick="append('.')">.</button>
            <button onclick="calculate()" class="equals">=</button>
        </div>
    </div>
    
    <script src="calculator.js"></script>
</body>
</html>
